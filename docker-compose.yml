# ============================================================
#  CICANET · Stack completo (desarrollo con hot-reload)
#
#  Un solo comando levanta TODO:
#      docker compose up
#
#  - API y Web montan el código y recompilan solas al guardar
#    (no hay que reconstruir imágenes en cada cambio).
#  - Infra (Postgres+PostGIS, Redis, MinIO, Martin) persiste en volúmenes.
#
#  Variables opcionales en .env (ver .env.example). Todo tiene default.
# ============================================================
name: cicanet

services:
  # ---- Base de datos principal + geografía ----
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cicanet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cicanet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cicanet_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cicanet}
    # No se publica al host para no chocar con otros stacks en :5432.
    # La API lo alcanza por la red interna (host "postgres").
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cicanet} -d ${POSTGRES_DB:-cicanet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cicanet-net]

  # ---- Cache, sesiones, OTP, colas (BullMQ) ----
  redis:
    image: redis:7-alpine
    container_name: cicanet-redis
    restart: unless-stopped
    # Solo red interna (host "redis"); no se publica para evitar conflictos.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [cicanet-net]

  # ---- Almacenamiento de objetos (facturas PDF, fotos) ----
  minio:
    image: minio/minio:latest
    container_name: cicanet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-cicanet}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-cicanet_dev}
    # Solo red interna (host "minio"); no se publica para evitar conflictos en :9000/:9001.
    volumes:
      - minio_data:/data
    networks: [cicanet-net]

  # ---- Tiles vectoriales sobre PostGIS para el mapa ----
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: cicanet-martin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cicanet}:${POSTGRES_PASSWORD:-cicanet_dev}@postgres:5432/${POSTGRES_DB:-cicanet}
    command: ["--config", "/config.yaml"]
    volumes:
      - ./infra/martin/config.yaml:/config.yaml:ro
    # Solo red interna (host "martin"); el frontend aún usa tiles CARTO, no se publica.
    networks: [cicanet-net]

  # ---- API (NestJS) — hot-reload ----
  api:
    build:
      context: ./apps/api
      target: dev
    container_name: cicanet-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_PORT: "4000"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3080}
      GEOCODER_PROVIDER: ${GEOCODER_PROVIDER:-mapbox}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
      GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-cicanet-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-cicanet-dev-refresh-secret-change-me}
      SEED_ADMIN_USER: ${SEED_ADMIN_USER:-admin}
      SEED_ADMIN_PASS: ${SEED_ADMIN_PASS:-cicanet2026}
      DATABASE_URL: postgres://${POSTGRES_USER:-cicanet}:${POSTGRES_PASSWORD:-cicanet_dev}@postgres:5432/${POSTGRES_DB:-cicanet}
      REDIS_URL: redis://redis:6379
      # Pasarela de pagos (Wompi)
      WOMPI_ENV: ${WOMPI_ENV:-sandbox}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      WOMPI_CURRENCY: ${WOMPI_CURRENCY:-COP}
      WOMPI_REDIRECT_URL: ${WOMPI_REDIRECT_URL:-https://cicanet.co/pago/resultado}
      CICANET_NEQUI: ${CICANET_NEQUI:-}
      CICANET_BANCOLOMBIA: ${CICANET_BANCOLOMBIA:-}
      # WhatsApp self-hosted vía Evolution API (gateway interno, no expuesto).
      # El teléfono de la empresa se vincula por QR desde el panel (sección Soporte).
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-evolution}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-cicanet-evolution-dev-key}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-cicanet}
      # Evolution entrega QR/estado/mensajes por evento → webhook al backend
      # (red interna de Docker). El secreto se añade en el PATH.
      EVOLUTION_WEBHOOK_URL: http://api:4000/api/whatsapp/webhook/evolution
      NOTIFICATION_WEBHOOK_SECRET: ${NOTIFICATION_WEBHOOK_SECRET:-cicanet-webhook-secret-dev}
      # Asistente virtual (LLM agnóstico compatible-OpenAI). Por defecto apunta a
      # Ollama del host (Qwen3 local). Cambiar a OpenRouter/Gemini = cambiar estas vars.
      ASSISTANT_PROVIDER: ${ASSISTANT_PROVIDER:-ollama}
      ASSISTANT_BASE_URL: ${ASSISTANT_BASE_URL:-http://host.docker.internal:11434/v1}
      ASSISTANT_API_KEY: ${ASSISTANT_API_KEY:-}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-qwen3:8b}
      # Respuestas breves = menos tokens = menos latencia (modelo local).
      ASSISTANT_MAX_TOKENS: ${ASSISTANT_MAX_TOKENS:-400}
      ASSISTANT_TEMPERATURE: ${ASSISTANT_TEMPERATURE:-0.3}
      # Agente local-rápido: pocas llamadas (plan→ejecutar→sintetizar), tools en
      # paralelo y presupuesto de tiempo acotado para no colgar la petición.
      ASSISTANT_CALL_TIMEOUT_MS: ${ASSISTANT_CALL_TIMEOUT_MS:-20000}
      ASSISTANT_BUDGET_MS: ${ASSISTANT_BUDGET_MS:-35000}
      ASSISTANT_MAX_TOOL_RESULT_CHARS: ${ASSISTANT_MAX_TOOL_RESULT_CHARS:-2500}
      # Raíz del código que el copiloto (rol admin) puede inspeccionar en SOLO
      # LECTURA. Se monta el monorepo completo en /workspace:ro (ver volumes).
      # El servicio bloquea por código .env, secretos y node_modules/.git.
      CODE_ROOT: ${CODE_ROOT:-/workspace}
      # Microservicio de facturación electrónica DIAN (red interna).
      EINVOICE_URL: ${EINVOICE_URL:-http://einvoice:8000}
      EINVOICE_API_KEY: ${EINVOICE_API_KEY:-cicanet-einvoice-dev-key}
      EINVOICE_NIT: ${EINVOICE_NIT:-}
      EINVOICE_AMBIENTE: ${EINVOICE_AMBIENTE:-habilitacion}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      # Monorepo completo en solo-lectura para el copiloto de código (admin).
      - ./:/workspace:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks: [cicanet-net]

  # ---- Web (Next.js) — hot-reload ----
  web:
    build:
      context: ./apps/web
      target: dev
    container_name: cicanet-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000/realtime}
      # Ortofoto oficial GeoMedellín (capa cliente). Endpoint de teselas ArcGIS
      # con patrón {z}/{y}/{x}. Si está vacío, el botón "Ortofoto Medellín" no aparece.
      NEXT_PUBLIC_GEOMEDELLIN_TILES: ${NEXT_PUBLIC_GEOMEDELLIN_TILES:-}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3080:3000"
    networks: [cicanet-net]

  # ---- WhatsApp self-hosted: Evolution API + DB y Redis DEDICADOS ----
  #  La empresa vincula su teléfono escaneando el QR desde el panel (Soporte).
  #  SEGURIDAD: no se expone a internet (solo loopback 127.0.0.1:8080 para debug);
  #  el backend lo consume por la red interna http://evolution-api:8080.
  #  Protegido por AUTHENTICATION_API_KEY (= EVOLUTION_API_KEY del backend).
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: cicanet-evolution
    restart: unless-stopped
    depends_on:
      - evolution-db
      - evolution-redis
    ports:
      - "127.0.0.1:8080:8080"   # solo loopback (no expuesto a internet)
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-cicanet-evolution-dev-key}
      SERVER_URL: http://evolution-api:8080
      # Persistencia de sesiones en Postgres dedicado (sobreviven reinicios).
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-db:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache en Redis dedicado.
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      # El webhook se configura por instancia desde el backend (no global).
      WEBHOOK_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    networks: [cicanet-net]

  evolution-db:
    image: postgres:16-alpine
    container_name: cicanet-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    networks: [cicanet-net]

  evolution-redis:
    image: redis:7-alpine
    container_name: cicanet-evolution-redis
    restart: unless-stopped
    volumes:
      - evolution_redis:/data
    networks: [cicanet-net]

  # ---- Facturación electrónica DIAN (microservicio interno, NO expuesto) ----
  # Industrializado desde "zeroset". Firma XAdES + UBL 2.1 + envío SOAP a la DIAN.
  # Solo accesible por el backend en la red interna; exige EINVOICE_API_KEY.
  # Los certificados de CICANET se cargan por su API y persisten en el volumen.
  einvoice:
    build:
      context: ./services/einvoice
      dockerfile: Dockerfile.api
    container_name: cicanet-einvoice
    restart: unless-stopped
    environment:
      # Clave compartida con el backend (header X-API-Key). Fail-closed si falta.
      EINVOICE_API_KEY: ${EINVOICE_API_KEY:-cicanet-einvoice-dev-key}
      # Contraseña del certificado .pfx de CICANET (se inyecta por env/secret).
      CERT_PASSWORD: ${EINVOICE_CERT_PASSWORD:-}
      # Orígenes CORS permitidos (solo el backend interno).
      EINVOICE_CORS_ORIGINS: ${EINVOICE_CORS_ORIGINS:-http://api:4000,http://localhost:4000}
      PYTHONUNBUFFERED: "1"
    volumes:
      # Certificados y documentos emitidos persistentes (por NIT).
      - einvoice_certs:/app/certificados
    # Sin `ports`: NO se publica a internet. El backend lo alcanza por red interna.
    networks: [cicanet-net]

volumes:
  pg_data:
  redis_data:
  minio_data:
  evolution_instances:
  evolution_pgdata:
  evolution_redis:
  einvoice_certs:

networks:
  cicanet-net:
    driver: bridge
