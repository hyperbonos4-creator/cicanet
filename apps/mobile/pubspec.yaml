name: cicanet_mobile
description: "CICANET — App del cliente (ISP). Estado del servicio, facturas, pagos, dispositivos y soporte."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (mismo patrón que URBAN)
  flutter_riverpod: ^2.6.1

  # HTTP + networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # Almacenamiento seguro de tokens
  flutter_secure_storage: ^9.2.4

  # Tiempo real (estado del servicio)
  socket_io_client: ^2.0.3+1

  # Utilidades
  intl: ^0.20.2
  url_launcher: ^6.3.1

  # Cámara/galería para la evidencia fotográfica del técnico en campo
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
