name: iOS Build (IPA sin firma)

# Compila la app Flutter de CICANET para iOS en un Mac de GitHub (gratis) y
# publica un .ipa SIN FIRMAR como artefacto descargable. Para instalarlo en un
# iPhone real se usa Sideloadly/AltStore en Windows con un Apple ID gratuito
# (la firma de desarrollo gratuita caduca a los 7 dias).
#
# Para TestFlight / App Store hace falta el Apple Developer Program (99 USD/ano).
#
# Replicado del metodo de URBAN, adaptado a la ruta apps/mobile y con la opcion
# de inyectar la URL publica del API (para que el .ipa funcione en el iPhone real).

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'URL publica del API (https). Ej: https://xxxx.ngrok-free.app/api . Vacio = http://localhost:4000/api'
        required: false
        default: ''
  push:
    branches: [main, master, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ipa:
    name: flutter build ios (sin firma) -> .ipa
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Seleccionar el Xcode mas nuevo
        run: |
          echo "Xcodes disponibles:"; ls -d /Applications/Xcode_*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build iOS (release, sin firma)
        working-directory: apps/mobile
        run: |
          API_URL="${{ github.event.inputs.api_base_url }}"
          if [ -n "$API_URL" ]; then
            echo "Compilando con API_BASE_URL=$API_URL"
            flutter build ios --release --no-codesign --dart-define=API_BASE_URL="$API_URL"
          else
            echo "Compilando con API por defecto (http://localhost:4000/api)"
            flutter build ios --release --no-codesign
          fi

      - name: Empaquetar .ipa (sin firma)
        working-directory: apps/mobile/build/ios/iphoneos
        run: |
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -r cicanet_mobile-unsigned.ipa Payload >/dev/null
          ls -lh cicanet_mobile-unsigned.ipa

      - name: Subir artefacto .ipa
        uses: actions/upload-artifact@v4
        with:
          name: cicanet_mobile-unsigned-ipa
          path: apps/mobile/build/ios/iphoneos/cicanet_mobile-unsigned.ipa
          if-no-files-found: error
