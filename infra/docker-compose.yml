# Infraestructura SOLO-BASE — CICANET
# (Postgres, Redis, MinIO, Martin — SIN api/web)
#
# ⚠️  Para el stack COMPLETO con hot-reload usa el compose de la RAÍZ:
#         docker compose up          (en la carpeta del proyecto)
#
# Este archivo es opcional: solo para levantar la infra sin las apps.
#   docker compose -f infra/docker-compose.yml up -d
services:
  # Base de datos principal + extensión geográfica
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cicanet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cicanet
      POSTGRES_PASSWORD: cicanet_dev
      POSTGRES_DB: cicanet
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Esquema + seed PostGIS (se ejecutan solo en la primera inicialización)
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  # Cache, sesiones, OTP y colas (BullMQ)
  redis:
    image: redis:7-alpine
    container_name: cicanet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Almacenamiento de objetos (facturas PDF, contratos, fotos) — compatible S3
  minio:
    image: minio/minio:latest
    container_name: cicanet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cicanet
      MINIO_ROOT_PASSWORD: cicanet_dev
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    volumes:
      - minio_data:/data

  # Servidor de tiles vectoriales sobre PostGIS para el mapa de cobertura
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: cicanet-martin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://cicanet:cicanet_dev@postgres:5432/cicanet
    command: ["--config", "/config.yaml"]
    volumes:
      - ./martin/config.yaml:/config.yaml:ro
    ports:
      - "3001:3000"

volumes:
  pg_data:
  redis_data:
  minio_data:
